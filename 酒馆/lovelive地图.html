
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveLive! 群星闪耀 · 大世界地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #090c14;
    font-family: 'Noto Sans SC', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  /* ── 顶部标题栏 ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: 44px;
    background: linear-gradient(135deg, rgba(8,12,28,0.97) 0%, rgba(16,20,48,0.97) 100%);
    border-bottom: 1px solid rgba(180,150,255,0.2);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px;
    backdrop-filter: blur(12px);
  }
  #header .logo {
    display: flex; align-items: center; gap: 6px;
  }
  #header .logo svg { width: 20px; height: 20px; }
  #header .title-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 12px; font-weight: 700;
    background: linear-gradient(90deg, #c8a6ff, #ff9ed2, #ffe066);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  #header .subtitle {
    font-size: 8px; color: rgba(200,166,255,0.6);
    letter-spacing: 2px; margin-top: 1px;
  }
  #header .stats {
    display: flex; gap: 12px;
  }
  .stat-item {
    text-align: center;
  }
  .stat-val {
    font-size: 14px; font-weight: 700;
    background: linear-gradient(90deg, #c8a6ff, #ff9ed2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-lbl {
    font-size: 8px; color: rgba(255,255,255,0.4); letter-spacing: 0.5px;
  }

  /* ── 地图容器 ── */
  #map {
    position: fixed;
    top: 44px; left: 0; right: 0; bottom: 0;
    background: #090c14;
  }

  /* ── Leaflet 覆盖 ── */
  .leaflet-container { background: #090c14 !important; }
  .leaflet-control-zoom a {
    background: rgba(16,20,48,0.9) !important;
    border-color: rgba(180,150,255,0.3) !important;
    color: #c8a6ff !important;
  }
  .leaflet-control-zoom a:hover {
    background: rgba(200,166,255,0.2) !important;
  }

  /* ── 自定义 Popup ── */
  .leaflet-popup-content-wrapper {
    background: rgba(8, 10, 28, 0.96) !important;
    border-radius: 12px !important;
    border: 1px solid rgba(200,166,255,0.3) !important;
    box-shadow: 0 0 30px rgba(180,150,255,0.15), 0 8px 32px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
    overflow: hidden;
    min-width: 280px;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    color: #e8e0ff;
  }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-close-button {
    color: rgba(200,166,255,0.6) !important;
    font-size: 18px !important;
    top: 10px !important; right: 12px !important;
    z-index: 10;
  }
  .leaflet-popup-close-button:hover { color: #c8a6ff !important; }
  .leaflet-popup-pane { z-index: 2000 !important; }
  .leaflet-popup { z-index: 2000 !important; }

  /* ── Popup 内部样式 ── */
  .popup-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(200,166,255,0.15);
    position: relative;
  }
  .popup-badge {
    display: inline-block;
    font-size: 10px; letter-spacing: 2px;
    padding: 2px 8px; border-radius: 20px;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .popup-school-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px; font-weight: 700;
    line-height: 1.2;
  }
  .popup-group-name {
    font-size: 12px; margin-top: 4px;
    opacity: 0.7; letter-spacing: 1px;
  }
  .popup-body {
    padding: 14px 20px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .popup-row {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 12.5px; line-height: 1.5;
  }
  .popup-icon {
    width: 18px; flex-shrink: 0;
    text-align: center; margin-top: 1px;
    font-size: 13px;
  }
  .popup-row-label {
    color: rgba(200,166,255,0.6);
    min-width: 36px; flex-shrink: 0;
  }
  .popup-row-val { color: #e8e0ff; }
  .popup-crisis {
    margin-top: 4px;
    padding: 8px 12px;
    background: rgba(255,80,120,0.08);
    border-left: 2px solid rgba(255,80,120,0.5);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: rgba(255,160,180,0.9);
  }

  /* ── 右侧信息面板 ── */
  #side-panel {
    position: fixed;
    top: 50px; right: 4px;
    width: 70px;
    max-height: calc(100vh - 60px);
    overflow-y: auto;
    z-index: 900;
    display: flex; flex-direction: column; gap: 3px;
  }
  #side-panel::-webkit-scrollbar {
    width: 2px;
  }
  #side-panel::-webkit-scrollbar-track {
    background: rgba(200,166,255,0.05);
    border-radius: 2px;
  }
  #side-panel::-webkit-scrollbar-thumb {
    background: rgba(200,166,255,0.3);
    border-radius: 2px;
  }
  .school-card {
    background: rgba(10,14,36,0.8);
    border-radius: 4px;
    border: 1px solid rgba(200,166,255,0.1);
    padding: 4px 6px;
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: all 0.2s;
  }
  .school-card:hover {
    border-color: rgba(200,166,255,0.4);
    background: rgba(20,24,56,0.9);
  }
  .sc-header {
    display: flex; align-items: center; gap: 3px;
  }
  .sc-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .sc-name { font-size: 9px; font-weight: 600; color: #e8e0ff; }
  .panel-section {
    margin-bottom: 4px;
  }
  .panel-section-title {
    font-size: 7px;
    color: rgba(200,166,255,0.5);
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    padding-left: 2px;
  }
  .rival-card {
    background: rgba(10,14,36,0.8);
    border-radius: 4px;
    border: 1px solid rgba(255,100,100,0.1);
    padding: 4px 6px;
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: all 0.2s;
  }
  .rival-card:hover {
    border-color: rgba(255,100,100,0.4);
    background: rgba(20,24,56,0.9);
  }
  .rival-dot {
    transform: rotate(45deg);
    border-radius: 1px !important;
  }

  /* ── 图例 ── */
  #legend {
    position: fixed;
    bottom: 8px; left: 4px;
    z-index: 900;
    background: rgba(10,14,36,0.8);
    border-radius: 4px;
    border: 1px solid rgba(200,166,255,0.1);
    padding: 4px 6px;
    backdrop-filter: blur(4px);
    max-height: 35vh;
    overflow-y: auto;
  }
  .legend-title {
    font-size: 7px; letter-spacing: 0.5px;
    color: rgba(200,166,255,0.4); margin-bottom: 2px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 3px;
    font-size: 7px; color: rgba(220,210,255,0.7);
    margin-bottom: 2px;
  }
  .legend-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* ── 星星背景动画 ── */
  #stars-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }
</style>
</head>

<script>
// ── 发送消息到 SillyTavern ──
function goToLocation(locationName) {
  const message = `前往${locationName}`;
  try {
    const textarea = document.querySelector('#send_textarea');
    if (textarea) {
      textarea.value = message;
      const sendBtn = document.querySelector('#send_but');
      if (sendBtn) sendBtn.click();
    }
  } catch(e) {
    console.log('发送消息:', message);
  }
}

// ── 星星背景 ──
(function(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const stars = Array.from({length:180}, ()=>({
    x: Math.random(), y: Math.random(),
    r: Math.random()*1.2+0.2,
    a: Math.random(),
    da: (Math.random()-0.5)*0.005
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a = Math.max(0.1, Math.min(1, s.a+s.da));
      if(s.a<=0.1||s.a>=1) s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x*c.width, s.y*c.height, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,180,255,${s.a*0.7})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── 地图初始化 ──
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -1.5,
  maxZoom: 3,
  zoomControl: true,
  attributionControl: false,
  center: [500, 800],
  zoom: 0
});

// 地图边界（虚拟坐标系：1600×1000）
const W = 1600, H = 1000;
const bounds = [[0,0],[H,W]];

// 绘制背景地图（SVG内联）
const svgBg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <defs>
    <radialGradient id="bg1" cx="35%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0d1230"/>
      <stop offset="100%" stop-color="#070a18"/>
    </radialGradient>
    <radialGradient id="bg2" cx="75%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#120820"/>
      <stop offset="100%" stop-color="#070a18"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="${W}" height="${H}" fill="#070a18"/>
  <rect width="${W}" height="${H}" fill="url(#bg1)" opacity="0.8"/>
  <rect width="${W}" height="${H}" fill="url(#bg2)" opacity="0.5"/>

  <!-- 海洋区域 -->
  <path d="M0,600 Q100,580 200,620 Q300,660 400,640 Q500,620 550,580 Q580,560 600,600 Q620,640 650,680 Q700,750 750,800 Q800,850 850,900 Q900,940 950,970 Q980,990 1000,1000 L0,1000 Z" 
        fill="rgba(20,40,100,0.25)" opacity="0.7"/>
  <!-- 海洋纹理线 -->
  <path d="M0,700 Q200,680 400,720 Q600,760 800,740 Q1000,720 1100,750 Q1300,780 1600,760" 
        fill="none" stroke="rgba(100,160,255,0.08)" stroke-width="1"/>
  <path d="M0,750 Q300,730 500,770 Q700,810 900,790 Q1100,770 1300,800 Q1450,820 1600,810" 
        fill="none" stroke="rgba(100,160,255,0.06)" stroke-width="1"/>
  <path d="M0,800 Q200,790 400,820 Q600,850 800,840 Q1000,830 1200,850 Q1400,860 1600,850" 
        fill="none" stroke="rgba(100,160,255,0.05)" stroke-width="1"/>

  <!-- 陆地轮廓（主岛） -->
  <path d="M120,80 Q180,60 260,70 Q380,80 420,120 Q460,160 500,180 Q580,200 640,160 Q720,120 800,140 Q860,160 900,200 Q940,240 920,300 Q900,360 860,400 Q820,440 800,500 Q780,560 820,580 Q860,600 840,640 Q820,680 760,700 Q700,720 640,700 Q580,680 540,640 Q500,600 460,580 Q420,560 380,580 Q340,600 300,580 Q260,560 240,520 Q220,480 200,440 Q180,400 160,360 Q140,320 120,280 Q100,240 100,200 Q100,140 120,80 Z" 
        fill="rgba(30,40,80,0.4)" opacity="0.8"/>

  <!-- 小岛（浦之星/沼津） -->
  <ellipse cx="1100" cy="680" rx="120" ry="70" fill="rgba(20,50,90,0.5)" opacity="0.8"/>
  <ellipse cx="1100" cy="680" rx="110" ry="62" fill="rgba(30,60,100,0.3)"/>

  <!-- 网格线（淡） -->
  ${Array.from({length:9}, (_,i)=>`<line x1="${(i+1)*160}" y1="0" x2="${(i+1)*160}" y2="${H}" stroke="rgba(100,120,200,0.04)" stroke-width="1"/>`).join('')}
  ${Array.from({length:6}, (_,i)=>`<line x1="0" y1="${(i+1)*143}" x2="${W}" y2="${(i+1)*143}" stroke="rgba(100,120,200,0.04)" stroke-width="1"/>`).join('')}

  <!-- 区域名称标注 -->
  <text x="500" y="55" text-anchor="middle" font-family="serif" font-size="13" fill="rgba(180,160,255,0.25)" letter-spacing="3">东京都 · 主城区</text>
  <text x="1100" y="580" text-anchor="middle" font-family="serif" font-size="11" fill="rgba(100,180,255,0.2)" letter-spacing="2">骏河湾</text>
  <text x="200" y="950" text-anchor="middle" font-family="serif" font-size="11" fill="rgba(100,180,255,0.2)" letter-spacing="2">东海岸</text>

  <!-- 装饰线 -->
  <line x1="300" y1="30" x2="700" y2="30" stroke="rgba(200,166,255,0.08)" stroke-width="0.5"/>
  <line x1="0" y1="550" x2="1600" y2="550" stroke="rgba(100,160,255,0.05)" stroke-width="0.5" stroke-dasharray="4,8"/>
</svg>`;

const svgUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgBg);
L.imageOverlay(svgUrl, bounds, {opacity: 1, zIndex: 1}).addTo(map);
map.fitBounds([[50,50],[950,1550]]);

  aqours: {

// ── 创建发光标记 ──
function createGlowMarker(latlng, color, glow, size=22) {
  const icon = L.divIcon({
    html: `<div style="
      width:${size}px; height:${size}px;
      border-radius:50%;
      background:${color};
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15), 0 0 12px ${glow}, 0 0 24px ${glow};
      border: 2px solid rgba(255,255,255,0.4);
      animation: pulse-${color.replace('#','')} 2s ease-in-out infinite;
      cursor: pointer;
    "></div>`,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
  return L.marker(latlng, {icon, interactive: true});
}

function createRivalMarker(latlng, color) {
  const icon = L.divIcon({
    html: `<div style="
      width:14px; height:14px;
      transform: rotate(45deg);
      background:${color};
      box-shadow: 0 0 8px ${color}88;
      border: 1px solid rgba(255,255,255,0.3);
      opacity:0.85;
    "></div>`,
    className: '',
    iconSize: [14,14],
    iconAnchor: [7,7]
  });
  return L.marker(latlng, {icon});
}

          font-size:14px;
          animation: arena-glow 1.5s ease-in-out infinite alternate;
        ">✨</div>
      </div>
      <style>
        @keyframes arena-pulse {
          0%, 100% { transform: scale(1); opacity: 0.6; }
          50% { transform: scale(1.4); opacity: 0.3; }
        }
        @keyframes arena-glow {
          0% { box-shadow: 0 0 12px #ff00ff, 0 0 24px #ff00ff88; }
          100% { box-shadow: 0 0 16px #00ffff, 0 0 32px #ff69b4; }
        }
      </style>
    `,
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
  const arenaMarker = L.marker(ARENA.latlng, {icon: arenaIcon}).addTo(map);
  arenaMarker.bindPopup(`
    <div class="popup-header" style="background:linear-gradient(135deg, rgba(255,0,255,0.2), rgba(0,255,255,0.1));">
      <div class="popup-badge" style="background:linear-gradient(90deg, #ff00ff, #00ffff);color:#fff;font-weight:bold;">✨ 秘密场所 ✨</div>
      <div class="popup-school-name" style="background:linear-gradient(90deg, #ff00ff, #ff69b4, #00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:16px;">${ARENA.name}</div>
      <div style="font-size:11px;color:#ff69b4;margin-top:4px;">${ARENA.subtitle}</div>
    </div>
    <div class="popup-body">
      <div class="popup-row"><div class="popup-icon">📍</div><div><span class="popup-row-val">${ARENA.desc}</span></div></div>
      <div class="popup-row"><div class="popup-icon">📩</div><div><span class="popup-row-val" style="color:#ff69b4">${ARENA.concept}</span></div></div>
      <div class="popup-row"><div class="popup-icon">👥</div><div><span class="popup-row-label">参与者</span><span class="popup-row-val" style="color:#00ffff">${ARENA.participants}</span></div></div>
      <div class="popup-row"><div class="popup-icon">🎭</div><div><span class="popup-row-label">特征</span><span class="popup-row-val" style="font-size:10px;line-height:1.4">
        • ${ARENA.features[0]}<br>
        • ${ARENA.features[1]}<br>
        • ${ARENA.features[2]}
      </span></div></div>
      <div class="popup-row" style="background:linear-gradient(90deg, rgba(255,0,255,0.1), rgba(0,255,255,0.1));margin:8px -12px;padding:8px 12px;border-radius:8px;">
        <div class="popup-icon" style="color:#ff00ff">👑</div>
        <div>
          <span class="popup-row-label" style="color:#ff69b4">你的身份</span>
          <span class="popup-row-val" style="color:#ff00ff;font-weight:bold">${ARENA.role}</span>
          <div style="font-size:10px;color:rgba(255,255,255,0.6);margin-top:2px;">${ARENA.role_desc}</div>
        </div>
      </div>
      <button onclick="goToLocation('${ARENA.name}')" style="
        width:100%;margin-top:10px;padding:10px 12px;
        background:linear-gradient(135deg, #ff00ff, #ff69b4, #00ffff);
        border:none;border-radius:8px;
        color:#fff;font-size:13px;font-weight:bold;
        cursor:pointer;transition:all 0.2s;
        text-shadow:0 1px 2px rgba(0,0,0,0.3);
      ">🚀 前往${ARENA.name}</button>
    </div>
  `, {maxWidth:300, className: 'arena-popup'});

// ── Arena 标签 ──
const arenaLabel = L.divIcon({
  html: `<div style="
    white-space:nowrap;
    font-size:11px;
    font-weight:bold;
    background:linear-gradient(90deg, #ff00ff, #ff69b4, #00ffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:none;
    pointer-events:none;
    letter-spacing:1px;
    text-align:center;
  ">✨ 色情偶像觉醒祭 ✨</div>`,
  className: '',
  iconSize: [140, 18],
  iconAnchor: [70, -20]
});
L.marker(ARENA.latlng, {icon: arenaLabel, interactive: false}).addTo(map);

// ── 连接线（Arena ↔ 四校） ──
const CENTER = ARENA.latlng;
Object.values(SCHOOLS).forEach(s => {
  L.polyline([CENTER, s.latlng], {
    color: s.color,
    weight: 1,
    opacity: 0.25,
    dashArray: '4,6'
  }).addTo(map);
});

// ── flyTo 函数（右侧卡片点击） ──
function flyTo(key) {
  const s = SCHOOLS[key];
  if (!s) return;
  map.flyTo(s.latlng, 1, { duration: 1.2, easeLinearity: 0.3 });
  setTimeout(function() {
    var marker = schoolMarkers[key];
    if (marker) marker.openPopup();
  }, 1300);
}

// ── flyToRival 函数（劲敌卡片点击） ──
function flyToRival(key) {
  const r = RIVALS[key];
  if (!r) return;
  map.flyTo(r.latlng, 1, { duration: 1.2, easeLinearity: 0.3 });
}

</script>
</body>
</html>
